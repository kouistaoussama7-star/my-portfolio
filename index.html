<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>2M LIVE TV</title>

  <link rel="stylesheet" href="stream.css">

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

  <div class="background"></div>

  <div class="container">

    <div class="topBar">

      <div class="logo">
        2M LIVE
      </div>

      <div class="liveBadge">
        <div class="dot"></div>
        LIVE
      </div>

    </div>

    <div class="videoBox">

      <video
        id="video"
        autoplay
        muted
        playsinline
        controls
      ></video>

    </div>

    <div class="controls">

      <button id="autoQuality">
        AUTO HD
      </button>

      <button id="lowQuality">
        LOW QUALITY
      </button>

    </div>

    <div class="bottomBar">

      <div class="channelName">
        2M Maroc HD
      </div>

      <div class="status">
        Stream Online
      </div>

    </div>

  </div>

  <script src="stream.js"></script>

</body>
</html>
<style>
  *{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  font-family:Arial, sans-serif;

  display:flex;
  justify-content:center;
  align-items:center;

  min-height:100vh;

  padding:20px;

  overflow-x:hidden;
}

.background{
  position:fixed;
  inset:0;

  background:
  radial-gradient(circle at top left,#ff000020,transparent 30%),
  radial-gradient(circle at bottom right,#ff000015,transparent 30%);

  z-index:-1;
}

.container{
  width:100%;
  max-width:1100px;

  background:#111;

  border-radius:25px;

  overflow:hidden;

  border:1px solid rgba(255,255,255,.05);

  box-shadow:
  0 0 60px rgba(255,0,0,.15);
}

.topBar{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:20px;

  background:#181818;
}

.logo{
  color:white;

  font-size:28px;
  font-weight:bold;

  letter-spacing:2px;
}

.liveBadge{
  background:red;

  color:white;

  padding:10px 18px;

  border-radius:50px;

  display:flex;
  align-items:center;
  gap:10px;

  font-weight:bold;
}

.dot{
  width:10px;
  height:10px;

  background:white;

  border-radius:50%;

  animation:pulse 1s infinite;
}

@keyframes pulse{

  0%{
    transform:scale(1);
    opacity:1;
  }

  50%{
    transform:scale(1.5);
    opacity:.5;
  }

  100%{
    transform:scale(1);
    opacity:1;
  }
}

.videoBox{
  position:relative;
  background:black;
}

video{
  width:100%;
  display:block;
  background:black;
}

.controls{
  display:flex;
  gap:15px;

  padding:20px;

  background:#141414;
}

button{
  flex:1;

  padding:15px;

  border:none;

  border-radius:12px;

  background:#ff0000;

  color:white;

  font-size:16px;
  font-weight:bold;

  cursor:pointer;

  transition:.3s;
}

button:hover{
  transform:translateY(-2px);
  opacity:.9;
}

.bottomBar{
  padding:18px 20px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  background:#181818;
}

.channelName{
  color:white;

  font-size:20px;
  font-weight:bold;
}

.status{
  color:#00ff73;

  font-size:15px;
}

@media(max-width:700px){

  .topBar,
  .bottomBar{
    flex-direction:column;
    gap:15px;
    text-align:center;
  }

  .controls{
    flex-direction:column;
  }

  .logo{
    font-size:22px;
  }

}
</style>
<script>
  const video = document.getElementById("video");

const autoBtn = document.getElementById("autoQuality");

const lowBtn = document.getElementById("lowQuality");

/*
STREAM LINKS
*/

const masterStream =
"https://stream-lb.livemediama.com/2m/hls/master.m3u8";

const lowStream =
"https://stream-lb.livemediama.com/2m/hls/stream_3/playlist.m3u8";

let hls;

function loadStream(stream){

  if(hls){
    hls.destroy();
  }

  if(Hls.isSupported()){

    hls = new Hls({

      liveSyncDuration:2,

      maxBufferLength:8,

      lowLatencyMode:true,

      enableWorker:true

    });

    hls.loadSource(stream);

    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function(){

      video.play();

    });

  }else if(video.canPlayType('application/vnd.apple.mpegurl')){

    video.src = stream;

    video.addEventListener('loadedmetadata', function(){

      video.play();

    });
  }
}

/*
DEFAULT QUALITY
*/

loadStream(masterStream);

/*
BUTTON EVENTS
*/

autoBtn.addEventListener("click", function(){

  loadStream(masterStream);

});

lowBtn.addEventListener("click", function(){

  loadStream(lowStream);

});
</script>
