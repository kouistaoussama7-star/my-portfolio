<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinmeis | Creative Designer</title>
    <style>
        :root {
            --primary: #00ff85; /* لون رجاوي مطور */
            --dark: #0a0a0a;
            --card: #1a1a1a;
        }
        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin-bottom: 20px;
        }
        h1 { margin: 10px 0; font-size: 2rem; }
        p { color: #aaa; line-height: 1.6; }
        .skills {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .skill-tag {
            background: var(--card);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            font-size: 0.8rem;
        }
        .btn {
            background: var(--primary);
            color: black;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://scontent-bcn1-1.cdninstagram.com/v/t51.82787-19/671807321_17877065517604281_8295069233748658848_n.jpg?_nc_cat=108&ccb=7-5&_nc_sid=bf7eb4&efg=eyJ2ZW5jb2RlX3RhZyI6InByb2ZpbGVfcGljLnd3dy4xMDgwLkMzIn0%3D&_nc_ohc=NfqEcMiodu4Q7kNvwHReBXq&_nc_oc=AdqxZ7oUYveMO9cXHdGdbq4T4b71x0C-qi72hXc_HwGQrDX5ShkCR8IxPnQytWgtqkA&_nc_zt=24&_nc_ht=scontent-bcn1-1.cdninstagram.com&_nc_gid=gYAO2qvzi94_kmKOYXZ_lQ&_nc_ss=796a8&oh=00_Af6DmMfYspOlEJA9t5qPagzMTiA4zhDYtw3-kwNEB631SA&oe=6A0CD26D" alt="Hamza" class="profile-img">
        <h1>Chinmeis : </h1>
        <p>Creative UI Designer & Lua Developer. Specialized in creating high-quality GIFs, motion graphics, and interactive digital experiences.</p>
        
        <div class="skills">
            <div class="skill-tag">UI Design</div>
            <div class="skill-tag">Lua</div>
            <div class="skill-tag">Motion Graphics</div>
        </div>

        <a href="https://giphy.com/channel/chinmeis" class="btn">View My GIPHY Channel</a>
    </div>

    <script>
        // تأثير بسيط ملي كتحل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            console.log("Portfolio Loaded Successfully!");
            document.querySelector('.container').style.opacity = '0';
            setTimeout(() => {
                document.querySelector('.container').style.transition = 'opacity 1s';
                document.querySelector('.container').style.opacity = '1';
            }, 100);
        });
    </script>
</body>
</html>
